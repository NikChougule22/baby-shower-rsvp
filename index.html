<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garbh Sanskar & Baby Shower RSVP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="invite-card">
      <img
        src="imagesinvite.png"
        alt="Garbh Sanskar and Baby Shower Invite"
        class="invite-image"
      />
    </div>

    <div class="address-card">
      <a
        class="address-link"
        href="https://www.google.com/maps/search/?api=1&query=8360+Sheldon+Rd+Elk+Grove+CA+95624"
        target="_blank"
        rel="noopener noreferrer"
      >
        Address: 8360 Sheldon Rd, Elk Grove, CA 95624
      </a>
    </div>

    <div class="rsvp-card">
      <div class="rsvp-inner">
        <h2 class="section-title">RSVP</h2>
        <p class="section-subtitle">
          Please enter your name and let us know if you'll be joining us.
        </p>

        <input
          type="text"
          id="guestName"
          placeholder="Enter your full name"
          autocomplete="name"
        />

        <input
          type="number"
          id="guestCount"
          placeholder="Number of people joining"
          min="1"
          step="1"
          inputmode="numeric"
        />

        <div class="btn-group">
          <button id="yesBtn" class="yes-btn" disabled>Attending</button>
          <button id="noBtn" class="no-btn" disabled>Not Attending</button>
        </div>

        <div id="status" class="status"></div>

        <div id="alreadyBox" class="already-box">
          RSVP has already been submitted from this device.
        </div>

        <div class="footer-note">We can't wait to celebrate with you.</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
